<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 680 680">
  <title>Mental Mods Academy Logo</title>
  <desc>Circular badge crest with cursive MM, graduation cap, line chart and tilted open books</desc>

  <style>
    .ring-text { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #f0e8db; letter-spacing: 3px; font-weight: 500; }
    .initials  { font-family: 'Pinyon Script', 'Cormorant Garamond', serif; font-size: 90px; fill: #c9973a; font-weight: 400; font-style: italic; }
    .academy   { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #c4a882; letter-spacing: 5px; font-weight: 500; }
    .tagline   { font-family: 'DM Sans', sans-serif; font-size: 9.5px; fill: #c4a882; letter-spacing: 2.5px; font-weight: 400; }
  </style>

  <defs>
    <path id="topArc"    d="M -230,0 A 230,230 0 0,1 230,0"/>
    <path id="bottomArc" d="M -220,0 A 220,220 0 0,0 220,0"/>
  </defs>

  <g transform="translate(340,340)">
    <circle r="268" fill="#2e2520"/>
    <circle r="268" fill="none" stroke="#c9973a" stroke-width="2.5"/>
    <circle r="255" fill="none" stroke="#c4a882" stroke-width="0.8" stroke-dasharray="4 3"/>
    <circle r="210" fill="none" stroke="#c9973a" stroke-width="1.5"/>
    <circle r="208" fill="#1a1612"/>
    <circle r="195" fill="none" stroke="#c4a882" stroke-width="0.6"/>

    <g fill="#c9973a">
      <polygon points="0,-195 3,-188 0,-185 -3,-188"/>
      <polygon points="0,195 3,188 0,185 -3,188"/>
      <polygon points="-195,0 -188,3 -185,0 -188,-3"/>
      <polygon points="195,0 188,3 185,0 188,-3"/>
    </g>

    <path d="M0,-142 L94,-108 L94,10 Q94,85 0,128 Q-94,85 -94,10 L-94,-108 Z" fill="#2e2520" stroke="#c9973a" stroke-width="1.8"/>
    <path d="M0,-130 L82,-99 L82,10 Q82,75 0,116 Q-82,75 -82,10 L-82,-99 Z" fill="none" stroke="#c4a882" stroke-width="0.6"/>

    <g transform="translate(0,-114)" fill="#c9973a">
      <polygon points="0,-11 32,0 0,11 -32,0"/>
      <rect x="-19" y="0" width="38" height="15" rx="2"/>
      <line x1="32" y1="0" x2="32" y2="15" stroke="#c9973a" stroke-width="1.2"/>
      <circle cx="32" cy="16" r="2.5"/>
      <line x1="30" y1="16" x2="27" y2="24" stroke="#c4a882" stroke-width="1"/>
      <line x1="32" y1="16" x2="32" y2="25" stroke="#c4a882" stroke-width="1"/>
      <line x1="34" y1="16" x2="37" y2="24" stroke="#c4a882" stroke-width="1"/>
    </g>

    <g transform="translate(-34, -52) rotate(-18)">
      <path d="M-26,-16 Q-14,-19 0,-15 L0,17 Q-14,13 -26,15 Z" fill="#c4a882" stroke="#a87830" stroke-width="0.8"/>
      <path d="M0,-15 Q12,-19 24,-16 L24,15 Q12,13 0,17 Z" fill="#f0e8db" stroke="#a87830" stroke-width="0.8"/>
      <line x1="0" y1="-15" x2="0" y2="17" stroke="#a87830" stroke-width="1.5"/>
      <line x1="-22" y1="-6"  x2="-4"  y2="-7"  stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
      <line x1="-22" y1="0"   x2="-4"  y2="-1"  stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
      <line x1="-22" y1="6"   x2="-4"  y2="5"   stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
      <line x1="4"   y1="-7"  x2="20"  y2="-6"  stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
      <line x1="4"   y1="-1"  x2="20"  y2="0"   stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
      <line x1="4"   y1="5"   x2="20"  y2="6"   stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
    </g>

    <g transform="translate(34, -52) rotate(18)">
      <path d="M-24,-16 Q-12,-19 0,-15 L0,17 Q-12,13 -24,15 Z" fill="#f0e8db" stroke="#a87830" stroke-width="0.8"/>
      <path d="M0,-15 Q12,-19 26,-16 L26,15 Q12,13 0,17 Z" fill="#c4a882" stroke="#a87830" stroke-width="0.8"/>
      <line x1="0" y1="-15" x2="0" y2="17" stroke="#a87830" stroke-width="1.5"/>
      <line x1="-20" y1="-7"  x2="-4"  y2="-6"  stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
      <line x1="-20" y1="-1"  x2="-4"  y2="0"   stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
      <line x1="-20" y1="5"   x2="-4"  y2="6"   stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
      <line x1="4"   y1="-6"  x2="22"  y2="-7"  stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
      <line x1="4"   y1="0"   x2="22"  y2="-1"  stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
      <line x1="4"   y1="6"   x2="22"  y2="5"   stroke="#a87830" stroke-width="0.7" opacity="0.6"/>
    </g>

    <text class="initials" text-anchor="middle" dominant-baseline="middle" y="22">MM</text>

    <g transform="translate(0, 76)">
      <path d="M-58,24 L-58,18 L-44,10 L-30,14 L-18,4 L-6,-10 L6,-6 L20,-18 L34,-14 L50,-26 L58,-22 L58,24 Z" fill="#c9973a" opacity="0.1"/>
      <path d="M-58,18 L-44,10 L-30,14 L-18,4 L-6,-10 L6,-6 L20,-18 L34,-14 L50,-26 L58,-22" fill="none" stroke="#c9973a" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="50" cy="-26" r="3" fill="#c9973a"/>
      <circle cx="50" cy="-26" r="5.5" fill="none" stroke="#c9973a" stroke-width="0.6" opacity="0.5"/>
      <line x1="-58" y1="24" x2="58" y2="24" stroke="#c4a882" stroke-width="0.5" opacity="0.4"/>
    </g>

    <line x1="-62" y1="118" x2="62" y2="118" stroke="#c9973a" stroke-width="1"/>
    <circle cx="-67" cy="118" r="2.5" fill="#c9973a"/>
    <circle cx="67"  cy="118" r="2.5" fill="#c9973a"/>

    <text class="academy" text-anchor="middle" y="138">ACADEMY</text>
    <text class="tagline" text-anchor="middle" y="156">MENTAL MODS</text>

    <text class="ring-text">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">
        ✦  MENTAL MODS ACADEMY  ✦  TRADING MEETS THERAPY
      </textPath>
    </text>
    <text class="ring-text">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
        ✦  CONSISTENCY OVER PERFECTION  ✦  EST. 2026
      </textPath>
    </text>

    <circle cx="-261" cy="0" r="3" fill="#c9973a"/>
    <circle cx="261"  cy="0" r="3" fill="#c9973a"/>
    <circle cx="0" cy="-261" r="3" fill="#c9973a"/>
    <circle cx="0"  cy="261" r="3" fill="#c9973a"/>
  </g>
</svg>
